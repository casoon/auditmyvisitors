name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: auditmyvisitors-macos-arm64
            binary: auditmyvisitors

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: auditmyvisitors-macos-x86_64
            binary: auditmyvisitors

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: auditmyvisitors-linux-x86_64
            binary: auditmyvisitors

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: auditmyvisitors-windows-x86_64.exe
            binary: auditmyvisitors.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools

      - name: Build
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Installation

            **macOS / Linux — one-line installer:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/casoon/auditmyvisitors/main/install.sh | bash
            ```

            **Manual download:** see assets below.
